<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi FAQ Assistant 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6f0 0%, #e8f0fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 390px;
            max-width: 90%;
            height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(230, 160, 180, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid #fff0f5;
        }

        .chat-header {
            background-color: #ffb6c1;
            color: #5a3e47;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-info h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .header-info p {
            font-size: 0.75rem;
            opacity: 0.85;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #fff9fb;
        }

        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.25s ease-in-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background-color: #ffffff;
            color: #5a3e47;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 2px solid #ffe4e1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .message.user {
            background-color: #ffb6c1;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 600;
        }

        /* Quick Suggestion Chips */
        .suggestions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .chip {
            background: #ffe4e1;
            color: #5a3e47;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.78rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-weight: 600;
        }

        .chip:hover {
            background: #ffb6c1;
            color: white;
        }

        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            background-color: #ffffff;
            border-top: 2px solid #fff0f5;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ffe4e1;
            border-radius: 25px;
            outline: none;
            font-size: 0.9rem;
            color: #5a3e47;
            background-color: #fff9fb;
        }

        .chat-input-area input:focus {
            border-color: #ffb6c1;
            background-color: #ffffff;
        }

        .chat-input-area button {
            padding: 10px 18px;
            background-color: #ffb6c1;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.1s;
        }

        .chat-input-area button:hover {
            background-color: #ff9baa;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🐰</div>
        <div class="header-info">
            <h2>Mochi Bot</h2>
            <p>Smart & Helpful Assistant ~ ✨</p>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            Hi friend! 🌸 I'm Mochi. How can I help you today?
            <div class="suggestions">
                <button class="chip" onclick="sendQuick('How do returns work?')">🔄 Returns</button>
                <button class="chip" onclick="sendQuick('How fast is shipping?')">🚚 Shipping</button>
                <button class="chip" onclick="sendQuick('Where is my package?')">📦 Track Order</button>
                <button class="chip" onclick="sendQuick('I see an error on site')">⚠️ Site Error</button>
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Ask Mochi a question..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">✨</button>
    </div>
</div>

<script>
    // Expanded FAQ Dataset covering common chit-chat & technical issues
    const faqData = [
        {
            question: "Greetings",
            answer: "Hello there! 💕 How can I help you today?",
            keywords: ["hi", "hello", "hey", "sup", "greetings", "good morning", "good evening"]
        },
        {
            question: "Small Talk / Acknowledgement",
            answer: "Awesome! Let me know if you have any questions about orders, returns, or shipping! 😊",
            keywords: ["ok", "okay", "k", "cool", "got it", "thanks", "thank you", "nice", "great"]
        },
        {
            question: "Website / Server Error",
            answer: "Oh no! 🥺 If you are experiencing a server error, try refreshing the page or clearing your cache. If it persists, please contact our tech team at support@example.com!",
            keywords: ["error", "server", "bug", "crash", "issue", "not working", "site down", "broken", "glitch", "failed"]
        },
        {
            question: "Return Policy",
            answer: "You can return any unused item within 30 days of purchase for a full refund! 📦✨",
            keywords: ["return", "returns", "refund", "exchange", "back", "item return", "money back"]
        },
        {
            question: "Shipping Options & Delivery",
            answer: "Standard shipping takes 3-5 business days. Express takes 1-2 business days! 🚚💨",
            keywords: ["shipping", "ship", "delivery", "deliver", "express", "fast", "arrive", "time", "how long"]
        },
        {
            question: "Order Tracking",
            answer: "We send a tracking link directly to your email as soon as your package ships! ✉️📍",
            keywords: ["track", "tracking", "status", "package", "where is", "order status"]
        },
        {
            question: "Payment Methods",
            answer: "We accept Visa, Mastercard, American Express, PayPal, and Apple Pay! 💳🌸",
            keywords: ["payment", "pay", "paypal", "credit card", "apple pay", "cards", "method"]
        },
        {
            question: "Customer Support Contact",
            answer: "You can reach our human support team via email at support@example.com or call 1-800-555-0199! 📞💖",
            keywords: ["contact", "support", "email", "phone", "human", "call", "agent", "help"]
        }
    ];

    // Simple TF-IDF / Keyword Scoring Matcher
    function getBestAnswer(query) {
        const cleanQuery = query.toLowerCase().replace(/[^a-z0-9\s]/g, '');
        const words = cleanQuery.split(/\s+/).filter(w => w.length > 0);

        if (words.length === 0) {
            return "Please type a question so I can help! 🌸";
        }

        let bestIndex = -1;
        let maxScore = 0;

        faqData.forEach((faq, index) => {
            let score = 0;

            words.forEach(word => {
                // Direct match on core keywords
                if (faq.keywords.includes(word)) {
                    score += 3;
                }
                // Partial match
                else {
                    faq.keywords.forEach(kw => {
                        if (kw.includes(word) || word.includes(kw)) {
                            score += 1;
                        }
                    });
                }
            });

            if (score > maxScore) {
                maxScore = score;
                bestIndex = index;
            }
        });

        if (maxScore > 0 && bestIndex !== -1) {
            return faqData[bestIndex].answer;
        } else {
            return "I'm not sure about that! 🥺 You can ask about shipping, returns, payment, or site errors, or email support@example.com!";
        }
    }

    function sendMessage() {
        const inputField = document.getElementById("userInput");
        const messageText = inputField.value.trim();

        if (messageText === "") return;

        appendMessage(messageText, "user");
        inputField.value = "";

        setTimeout(() => {
            const botResponse = getBestAnswer(messageText);
            appendMessage(botResponse, "bot");
        }, 300);
    }

    function sendQuick(text) {
        appendMessage(text, "user");
        setTimeout(() => {
            const botResponse = getBestAnswer(text);
            appendMessage(botResponse, "bot");
        }, 300);
    }

    function appendMessage(text, sender) {
        const chatMessages = document.getElementById("chatMessages");
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", sender);
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
